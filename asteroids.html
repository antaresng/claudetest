<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asteroids</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    #game {
      display: block;
    }

    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
      z-index: 10;
      font-size: 0.85rem;
      font-weight: 700;
      color: #a8dadc;
      letter-spacing: 1px;
    }

    #hud span {
      color: #eee;
    }

  </style>
</head>
<body>

<div id="game-container">
  <canvas id="game"></canvas>

  <div id="hud">
    <div>P1 <span id="p1-score">0</span> &nbsp; <span id="p1-lives">▲▲▲</span></div>
    <div>LVL <span id="level-val">1</span></div>
    <div><span id="p2-lives">▲▲▲</span> &nbsp; <span id="p2-score">0</span> P2</div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────────
let CANVAS_W          = window.innerWidth;
let CANVAS_H          = window.innerHeight;
const SHIP_SIZE       = 14;
const SHIP_WIDTH      = 9;
const SHIP_TURN_SPD   = 0.004;  // rad/ms
const SHIP_THRUST     = 0.12;
const SHIP_FRICTION   = 0.985;
const SHIP_MAX_SPD    = 7;
const BULLET_SPEED    = 9;
const BULLET_R        = 2;
const BULLET_LIFE     = 55;     // frames
const BULLET_COOLDOWN = 10;     // frames
const AST_SIZES       = [14, 28, 50];  // radius: small=0, medium=1, large=2
const AST_SPEEDS      = [2.2, 1.4, 0.8];
const AST_VERTICES    = [6, 8, 10];
const AST_SCORE       = [100, 50, 20]; // small, medium, large
const AST_JAGGEDNESS  = 0.35;
const AST_CHILDREN    = 2;
const LEVEL_AST_BASE  = 3;
const LEVEL_SPD_MULT  = 0.18;
const LIVES_START     = 3;
const INVINCIBLE_DUR  = 180;    // frames
const RESPAWN_DELAY   = 90;     // frames
const STAR_COUNT      = 60;

// ─── Canvas & Context ─────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

// ─── HUD Elements ─────────────────────────────────────────────────────────────
const p1ScoreEl = document.getElementById('p1-score');
const p1LivesEl = document.getElementById('p1-lives');
const levelValEl = document.getElementById('level-val');
const p2LivesEl = document.getElementById('p2-lives');
const p2ScoreEl = document.getElementById('p2-score');

// ─── Game State ───────────────────────────────────────────────────────────────
let gameState     = 'idle'; // idle | running | paused | gameover
let level         = 1;
let lastTimestamp = 0;

function makePlayer(startX) {
  return {
    x:            startX,
    y:            CANVAS_H / 2,
    vx:           0,
    vy:           0,
    angle:        -Math.PI / 2,
    thrusting:    false,
    invincible:   0,
    dead:         false,
    respawnTimer: 0,
    r:            SHIP_SIZE,
    score:        0,
    lives:        LIVES_START,
    bulletCooldown: 0,
  };
}

let p1 = makePlayer(CANVAS_W / 3);
let p2 = makePlayer(2 * CANVAS_W / 3);

let bullets   = [];
let asteroids = [];
let stars     = [];
const keys1   = { left: false, right: false, up: false };
const keys2   = { left: false, right: false, up: false };

// ─── Resize ───────────────────────────────────────────────────────────────────
function resizeCanvas() {
  CANVAS_W = window.innerWidth;
  CANVAS_H = window.innerHeight;
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  initStars();
}
window.addEventListener('resize', resizeCanvas);

// ─── Stars ────────────────────────────────────────────────────────────────────
function initStars() {
  stars = [];
  for (let i = 0; i < STAR_COUNT; i++) {
    stars.push({
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      r: Math.random() * 1.2 + 0.3,
    });
  }
}

// ─── Asteroid spawn ───────────────────────────────────────────────────────────
function spawnAsteroid(sizeIdx, x, y, pvx, pvy) {
  const r                = AST_SIZES[sizeIdx];
  const numVerts         = AST_VERTICES[sizeIdx];
  const levelSpeedMult   = 1 + LEVEL_SPD_MULT * (level - 1);
  const baseSpeed        = AST_SPEEDS[sizeIdx] * levelSpeedMult;
  const spawnAngle       = Math.random() * Math.PI * 2;
  const speed            = baseSpeed * (0.7 + Math.random() * 0.6);

  const vx = pvx + Math.cos(spawnAngle) * speed;
  const vy = pvy + Math.sin(spawnAngle) * speed;

  // Pre-compute jagged vertex offsets at spawn time
  const verts = [];
  for (let i = 0; i < numVerts; i++) {
    const a   = (i / numVerts) * Math.PI * 2;
    const jag = 1 - AST_JAGGEDNESS + Math.random() * AST_JAGGEDNESS * 2;
    verts.push([Math.cos(a) * r * jag, Math.sin(a) * r * jag]);
  }

  asteroids.push({
    x, y, vx, vy,
    size:   sizeIdx,
    r,
    angle:  Math.random() * Math.PI * 2,
    rotSpd: (Math.random() - 0.5) * 0.04,
    verts,
  });
}

function spawnWave(lvl) {
  const count = LEVEL_AST_BASE + (lvl - 1);
  const safeR = 100;
  for (let i = 0; i < count; i++) {
    let x, y;
    do {
      x = Math.random() * CANVAS_W;
      y = Math.random() * CANVAS_H;
    } while (
      Math.hypot(x - CANVAS_W / 3,     y - CANVAS_H / 2) < safeR ||
      Math.hypot(x - 2 * CANVAS_W / 3, y - CANVAS_H / 2) < safeR
    );
    spawnAsteroid(2, x, y, 0, 0);
  }
}

// ─── Bullets ─────────────────────────────────────────────────────────────────
function fireBullet(p, color) {
  if (p.bulletCooldown > 0 || p.dead || p.lives <= 0) return;
  p.bulletCooldown = BULLET_COOLDOWN;

  const bx = p.x + Math.cos(p.angle) * SHIP_SIZE;
  const by = p.y + Math.sin(p.angle) * SHIP_SIZE;

  bullets.push({
    x:     bx,
    y:     by,
    vx:    p.vx + Math.cos(p.angle) * BULLET_SPEED,
    vy:    p.vy + Math.sin(p.angle) * BULLET_SPEED,
    life:  BULLET_LIFE,
    r:     BULLET_R,
    owner: p,
    color,
  });
}

// ─── Torus wrap ───────────────────────────────────────────────────────────────
function wrapPosition(obj) {
  const pad = obj.r || 0;
  if (obj.x < -pad)             obj.x = CANVAS_W + pad;
  if (obj.x > CANVAS_W + pad)   obj.x = -pad;
  if (obj.y < -pad)             obj.y = CANVAS_H + pad;
  if (obj.y > CANVAS_H + pad)   obj.y = -pad;
}

// ─── Kill / Respawn ───────────────────────────────────────────────────────────
function killPlayer(p) {
  p.dead = true;
  p.lives--;
  updateHUD();
  if (p1.lives <= 0 && p2.lives <= 0) {
    gameState = 'gameover';
  } else if (p.lives > 0) {
    p.respawnTimer = RESPAWN_DELAY;
  }
  // If p.lives <= 0, ship is permanently gone (no respawn)
}

function respawnPlayer(p, startX) {
  p.x          = startX;
  p.y          = CANVAS_H / 2;
  p.vx         = 0;
  p.vy         = 0;
  p.angle      = -Math.PI / 2;
  p.thrusting  = false;
  p.dead       = false;
  p.invincible = INVINCIBLE_DUR;
}

// ─── Asteroid hit ─────────────────────────────────────────────────────────────
// Returns staged children to spawn after the iteration loop
function hitAsteroid(idx, owner) {
  const ast = asteroids[idx];
  owner.score += AST_SCORE[ast.size];
  updateHUD();

  const children = [];
  if (ast.size > 0) {
    for (let i = 0; i < AST_CHILDREN; i++) {
      children.push({ size: ast.size - 1, x: ast.x, y: ast.y, pvx: ast.vx, pvy: ast.vy });
    }
  }

  asteroids.splice(idx, 1);
  return children;
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  p1ScoreEl.textContent = p1.score;
  p1LivesEl.textContent = '▲'.repeat(Math.max(0, p1.lives));
  levelValEl.textContent = level;
  p2LivesEl.textContent = '▲'.repeat(Math.max(0, p2.lives));
  p2ScoreEl.textContent = p2.score;
}

// ─── Reset ────────────────────────────────────────────────────────────────────
function resetGame() {
  level     = 1;
  bullets   = [];
  asteroids = [];

  keys1.left = false; keys1.right = false; keys1.up = false;
  keys2.left = false; keys2.right = false; keys2.up = false;

  p1 = makePlayer(CANVAS_W / 3);
  p2 = makePlayer(2 * CANVAS_W / 3);

  updateHUD();
  spawnWave(level);
  gameState = 'running';
}

// ─── Update ───────────────────────────────────────────────────────────────────
function updatePlayer(p, keys, startX, scale, dt) {
  if (p.lives <= 0) return; // permanently gone

  if (p.bulletCooldown > 0) p.bulletCooldown -= scale;

  if (p.dead) {
    p.respawnTimer -= scale;
    if (p.respawnTimer <= 0) respawnPlayer(p, startX);
    return;
  }

  if (p.invincible > 0) p.invincible -= scale;

  if (keys.left)  p.angle -= SHIP_TURN_SPD * dt;
  if (keys.right) p.angle += SHIP_TURN_SPD * dt;

  p.thrusting = keys.up;
  if (p.thrusting) {
    p.vx += Math.cos(p.angle) * SHIP_THRUST * scale;
    p.vy += Math.sin(p.angle) * SHIP_THRUST * scale;
    const spd = Math.hypot(p.vx, p.vy);
    if (spd > SHIP_MAX_SPD) {
      p.vx = (p.vx / spd) * SHIP_MAX_SPD;
      p.vy = (p.vy / spd) * SHIP_MAX_SPD;
    }
  }

  p.vx *= Math.pow(SHIP_FRICTION, scale);
  p.vy *= Math.pow(SHIP_FRICTION, scale);
  p.x  += p.vx * scale;
  p.y  += p.vy * scale;
  wrapPosition(p);
}

function update(dt) {
  const scale = dt / 16.667;

  updatePlayer(p1, keys1, CANVAS_W / 3, scale, dt);
  updatePlayer(p2, keys2, 2 * CANVAS_W / 3, scale, dt);

  // Asteroids
  for (const ast of asteroids) {
    ast.x     += ast.vx * scale;
    ast.y     += ast.vy * scale;
    ast.angle += ast.rotSpd * scale;
    wrapPosition(ast);
  }

  // Bullets
  for (const b of bullets) {
    b.x    += b.vx * scale;
    b.y    += b.vy * scale;
    b.life -= scale;
    wrapPosition(b);
  }
  bullets = bullets.filter(b => b.life > 0);

  // Collisions — bullets vs asteroids
  const toSpawn = [];
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ai = asteroids.length - 1; ai >= 0; ai--) {
      if (Math.hypot(b.x - asteroids[ai].x, b.y - asteroids[ai].y) < b.r + asteroids[ai].r) {
        toSpawn.push(...hitAsteroid(ai, b.owner));
        bullets.splice(bi, 1);
        break;
      }
    }
  }
  for (const c of toSpawn) {
    spawnAsteroid(c.size, c.x, c.y, c.pvx, c.pvy);
  }

  // Collisions — ship vs asteroids (no friendly fire)
  const hitR = SHIP_SIZE * 0.7;
  for (const p of [p1, p2]) {
    if (p.dead || p.lives <= 0 || p.invincible > 0) continue;
    for (let ai = asteroids.length - 1; ai >= 0; ai--) {
      if (Math.hypot(p.x - asteroids[ai].x, p.y - asteroids[ai].y) < hitR + asteroids[ai].r) {
        killPlayer(p);
        break;
      }
    }
  }

  // Level up — all asteroids cleared and at least one player still in game
  const anyAlive = p1.lives > 0 || p2.lives > 0;
  if (asteroids.length === 0 && anyAlive) {
    level++;
    updateHUD();
    spawnWave(level);
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (const s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Asteroids — stroke-only teal jagged polygons
  ctx.strokeStyle = '#a8dadc';
  ctx.lineWidth = 1.5;
  for (const ast of asteroids) {
    ctx.save();
    ctx.translate(ast.x, ast.y);
    ctx.rotate(ast.angle);
    ctx.beginPath();
    for (let i = 0; i < ast.verts.length; i++) {
      const [vx, vy] = ast.verts[i];
      i === 0 ? ctx.moveTo(vx, vy) : ctx.lineTo(vx, vy);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Bullets — colored by owner
  for (const b of bullets) {
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ships
  renderShip(p1, '#eee');
  renderShip(p2, '#e94560');

  // State overlays
  if (gameState === 'idle') {
    renderIdleScreen();
  } else if (gameState === 'paused') {
    renderPauseOverlay();
  } else if (gameState === 'gameover') {
    renderGameOverScreen();
  }
}

function renderShip(p, shipColor) {
  if (p.dead || p.lives <= 0) return;

  // Blink during invincibility
  if (p.invincible > 0 && Math.floor(p.invincible / 5) % 2 !== 0) return;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle + Math.PI / 2);

  // Amber thrust flame
  if (p.thrusting) {
    const flicker = 0.6 + Math.random() * 0.4;
    ctx.strokeStyle = '#f0a500';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-SHIP_WIDTH * 0.5,  SHIP_SIZE * 0.6);
    ctx.lineTo(0,                   SHIP_SIZE * 0.6 + SHIP_SIZE * 0.7 * flicker);
    ctx.lineTo( SHIP_WIDTH * 0.5,  SHIP_SIZE * 0.6);
    ctx.stroke();
  }

  // Ship triangle
  ctx.strokeStyle = shipColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0,             -SHIP_SIZE);
  ctx.lineTo(-SHIP_WIDTH,   SHIP_SIZE * 0.6);
  ctx.lineTo(0,              SHIP_SIZE * 0.3);
  ctx.lineTo( SHIP_WIDTH,   SHIP_SIZE * 0.6);
  ctx.closePath();
  ctx.stroke();

  ctx.restore();
}

function renderIdleScreen() {
  ctx.fillStyle = 'rgba(26, 26, 46, 0.82)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#a8dadc';
  ctx.font = 'bold 2.8rem Segoe UI, sans-serif';
  ctx.fillText('ASTEROIDS', CANVAS_W / 2, CANVAS_H / 2 - 60);

  ctx.fillStyle = '#eee';
  ctx.font = '0.95rem Segoe UI, sans-serif';
  ctx.fillText('Destroy all asteroids to advance levels', CANVAS_W / 2, CANVAS_H / 2 - 14);
  ctx.fillText('Large \u2192 Medium \u2192 Small \u2192 Gone', CANVAS_W / 2, CANVAS_H / 2 + 12);

  ctx.fillStyle = '#f0a500';
  ctx.font = 'bold 1rem Segoe UI, sans-serif';
  ctx.fillText('Press any key to start', CANVAS_W / 2, CANVAS_H / 2 + 56);

  ctx.fillStyle = '#eee';
  ctx.font = '0.75rem Segoe UI, sans-serif';
  ctx.fillText('P1: \u2190 \u2192 Rotate  \u2191 Thrust  Space Fire', CANVAS_W / 2, CANVAS_H / 2 + 80);
  ctx.fillStyle = '#e94560';
  ctx.fillText('P2: A D Rotate  W Thrust  Shift Fire', CANVAS_W / 2, CANVAS_H / 2 + 102);
  ctx.fillStyle = '#555';
  ctx.font = '0.7rem Segoe UI, sans-serif';
  ctx.fillText('P Pause', CANVAS_W / 2, CANVAS_H / 2 + 124);
}

function renderPauseOverlay() {
  ctx.fillStyle = 'rgba(26, 26, 46, 0.78)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#eee';
  ctx.font = 'bold 2.2rem Segoe UI, sans-serif';
  ctx.fillText('PAUSED', CANVAS_W / 2, CANVAS_H / 2 - 16);

  ctx.fillStyle = '#888';
  ctx.font = '1rem Segoe UI, sans-serif';
  ctx.fillText('Press P to resume', CANVAS_W / 2, CANVAS_H / 2 + 20);
}

function renderGameOverScreen() {
  ctx.fillStyle = 'rgba(26, 26, 46, 0.88)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 2rem Segoe UI, sans-serif';
  ctx.fillText('GAME OVER', CANVAS_W / 2, CANVAS_H / 2 - 90);

  ctx.fillStyle = '#aaa';
  ctx.font = '0.9rem Segoe UI, sans-serif';
  ctx.fillText('Level Reached: ' + level, CANVAS_W / 2, CANVAS_H / 2 - 52);

  // P1 score
  ctx.fillStyle = '#eee';
  ctx.font = 'bold 1rem Segoe UI, sans-serif';
  ctx.fillText('P1', CANVAS_W / 2, CANVAS_H / 2 - 18);
  ctx.font = 'bold 2rem Segoe UI, sans-serif';
  ctx.fillText(p1.score, CANVAS_W / 2, CANVAS_H / 2 + 16);

  // P2 score
  ctx.fillStyle = '#e94560';
  ctx.font = 'bold 1rem Segoe UI, sans-serif';
  ctx.fillText('P2', CANVAS_W / 2, CANVAS_H / 2 + 48);
  ctx.font = 'bold 2rem Segoe UI, sans-serif';
  ctx.fillText(p2.score, CANVAS_W / 2, CANVAS_H / 2 + 82);

  // Winner
  const totalP1 = p1.score, totalP2 = p2.score;
  let winnerText;
  if (totalP1 > totalP2)       winnerText = 'P1 Wins!';
  else if (totalP2 > totalP1)  winnerText = 'P2 Wins!';
  else                         winnerText = 'Tie!';

  ctx.fillStyle = '#f0a500';
  ctx.font = 'bold 1.2rem Segoe UI, sans-serif';
  ctx.fillText(winnerText, CANVAS_W / 2, CANVAS_H / 2 + 118);

  ctx.font = 'bold 1rem Segoe UI, sans-serif';
  ctx.fillText('Press R to play again', CANVAS_W / 2, CANVAS_H / 2 + 150);
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(timestamp - lastTimestamp, 50);
  lastTimestamp = timestamp;
  if (gameState === 'running') update(dt);
  render();
}

// ─── Input ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const preventCodes = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'Space', 'KeyW', 'ShiftLeft', 'ShiftRight'];
  if (preventCodes.includes(e.code)) e.preventDefault();

  if (gameState === 'idle') {
    resetGame();
    return;
  }

  if (gameState === 'gameover') {
    if (e.code === 'KeyR') resetGame();
    return;
  }

  if (e.code === 'KeyP') {
    gameState = gameState === 'paused' ? 'running' : 'paused';
    return;
  }

  if (gameState !== 'running') return;

  // P1 — arrow keys + Space
  if (e.code === 'ArrowLeft')  keys1.left  = true;
  if (e.code === 'ArrowRight') keys1.right = true;
  if (e.code === 'ArrowUp')    keys1.up    = true;
  if (e.code === 'Space')      fireBullet(p1, '#eee');

  // P2 — WASD + Shift
  if (e.code === 'KeyA') keys2.left  = true;
  if (e.code === 'KeyD') keys2.right = true;
  if (e.code === 'KeyW') keys2.up    = true;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') fireBullet(p2, '#e94560');
});

document.addEventListener('keyup', e => {
  if (e.code === 'ArrowLeft')  keys1.left  = false;
  if (e.code === 'ArrowRight') keys1.right = false;
  if (e.code === 'ArrowUp')    keys1.up    = false;

  if (e.code === 'KeyA') keys2.left  = false;
  if (e.code === 'KeyD') keys2.right = false;
  if (e.code === 'KeyW') keys2.up    = false;
});

// ─── Start ────────────────────────────────────────────────────────────────────
resizeCanvas();
updateHUD();
requestAnimationFrame(ts => {
  lastTimestamp = ts;
  requestAnimationFrame(gameLoop);
});
</script>
</body>
</html>
