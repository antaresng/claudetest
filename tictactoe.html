<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.2rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .control-group label {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    select, #difficultySlider {
      background: #16213e;
      color: #eee;
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.95rem;
      cursor: pointer;
    }

    #difficultySlider {
      -webkit-appearance: none;
      appearance: none;
      width: 160px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #4caf50, #f0a500, #e94560);
      outline: none;
      padding: 0;
    }

    #difficultySlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      border: 2px solid #0f3460;
    }

    #difficultyLabel {
      font-size: 0.9rem;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #scores {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      border: 1px solid #0f3460;
    }

    .score-box .label { color: #888; font-size: 0.8rem; margin-bottom: 2px; }
    .score-box .val   { font-size: 1.5rem; font-weight: bold; }
    .score-box.x .val { color: #e94560; }
    .score-box.o .val { color: #a8dadc; }
    .score-box.draw .val { color: #f0a500; }

    #restart {
      margin-top: 1rem;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
    }

    #restart:hover { background: #c73652; }

    .thinking { opacity: 0.5; pointer-events: none; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="controls">
  <div class="control-group">
    <label>Mode</label>
    <select id="modeSelect">
      <option value="pvp">2 Players</option>
      <option value="pvc" selected>vs Computer</option>
    </select>
  </div>
  <div class="control-group" id="difficultyGroup">
    <label>Difficulty — <span id="difficultyLabel">Medium</span></label>
    <input type="range" id="difficultySlider" min="0" max="10" value="5">
  </div>
</div>

<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="scores">
  <div class="score-box x">
    <div class="label">X WINS</div>
    <div class="val" id="scoreX">0</div>
  </div>
  <div class="score-box draw">
    <div class="label">DRAWS</div>
    <div class="val" id="scoreDraw">0</div>
  </div>
  <div class="score-box o">
    <div class="label" id="oLabel">O WINS</div>
    <div class="val" id="scoreO">0</div>
  </div>
</div>

<button id="restart">New Game</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, current, over, scores = { X: 0, O: 0, draw: 0 };

  const cells          = document.querySelectorAll('.cell');
  const status         = document.getElementById('status');
  const scoreX         = document.getElementById('scoreX');
  const scoreO         = document.getElementById('scoreO');
  const scoreDraw      = document.getElementById('scoreDraw');
  const modeSelect     = document.getElementById('modeSelect');
  const diffGroup      = document.getElementById('difficultyGroup');
  const diffSlider     = document.getElementById('difficultySlider');
  const diffLabel      = document.getElementById('difficultyLabel');
  const oLabel         = document.getElementById('oLabel');
  const boardEl        = document.getElementById('board');

  // ── Difficulty label ──────────────────────────────────────────────
  const DIFF_NAMES = ['Infant','Easy','Easy','Easy','Medium','Medium','Medium','Hard','Hard','Hard','Unbeatable'];

  function updateDiffLabel() {
    const v = +diffSlider.value;
    diffLabel.textContent = DIFF_NAMES[v];
    const colors = { Infant:'#4caf50', Easy:'#4caf50', Medium:'#f0a500', Hard:'#e94560', Unbeatable:'#e94560' };
    diffLabel.style.color = colors[DIFF_NAMES[v]];
  }

  diffSlider.addEventListener('input', updateDiffLabel);
  updateDiffLabel();

  modeSelect.addEventListener('change', () => {
    diffGroup.style.display = modeSelect.value === 'pvc' ? '' : 'none';
    oLabel.textContent = modeSelect.value === 'pvc' ? 'CPU WINS' : 'O WINS';
    scores = { X: 0, O: 0, draw: 0 };
    updateScoreDisplay();
    init();
  });

  // ── Game logic ────────────────────────────────────────────────────
  function init() {
    board = Array(9).fill('');
    current = 'X';
    over = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    boardEl.classList.remove('thinking');
    status.textContent = "Player X's turn";
  }

  function checkWinner(b) {
    for (const [a, i, c] of WINS) {
      if (b[a] && b[a] === b[i] && b[a] === b[c])
        return { winner: b[a], line: [a, i, c] };
    }
    if (b.every(v => v)) return { winner: null, line: [] };
    return null;
  }

  function placeMarker(i, player) {
    board[i] = player;
    cells[i].textContent = player === 'X' ? '✕' : '◯';
    cells[i].classList.add(player.toLowerCase(), 'taken');
  }

  function endGame(result) {
    over = true;
    if (result.winner) {
      result.line.forEach(idx => cells[idx].classList.add('win'));
      const who = (modeSelect.value === 'pvc' && result.winner === 'O') ? 'Computer' : `Player ${result.winner}`;
      status.textContent = `${who} wins! 🎉`;
      scores[result.winner]++;
    } else {
      status.textContent = "It's a draw!";
      scores.draw++;
    }
    updateScoreDisplay();
  }

  function updateScoreDisplay() {
    scoreX.textContent    = scores.X;
    scoreO.textContent    = scores.O;
    scoreDraw.textContent = scores.draw;
  }

  // ── AI ────────────────────────────────────────────────────────────
  // Minimax (perfect play)
  function minimax(b, isMax) {
    const res = checkWinner(b);
    if (res) {
      if (res.winner === 'O') return 10;
      if (res.winner === 'X') return -10;
      return 0;
    }
    const scores = [];
    b.forEach((v, i) => {
      if (!v) {
        b[i] = isMax ? 'O' : 'X';
        scores.push(minimax(b, !isMax));
        b[i] = '';
      }
    });
    return isMax ? Math.max(...scores) : Math.min(...scores);
  }

  function bestMove(b) {
    let best = -Infinity, move = -1;
    b.forEach((v, i) => {
      if (!v) {
        b[i] = 'O';
        const s = minimax(b, false);
        b[i] = '';
        if (s > best) { best = s; move = i; }
      }
    });
    return move;
  }

  function randomMove(b) {
    const empty = b.map((v, i) => v ? null : i).filter(i => i !== null);
    return empty[Math.floor(Math.random() * empty.length)];
  }

  // Find a winning or blocking move for `player`
  function tacticalMove(b, player) {
    for (const [a, i, c] of WINS) {
      const line = [b[a], b[i], b[c]];
      const positions = [a, i, c];
      const filled = line.filter(v => v === player).length;
      const empty  = line.filter(v => !v).length;
      if (filled === 2 && empty === 1) {
        return positions[line.indexOf('')];
      }
    }
    return -1;
  }

  function aiMove() {
    const skill = +diffSlider.value; // 0–10
    const b = [...board];

    // skill 10 → pure minimax (unbeatable)
    if (skill === 10) return bestMove(b);

    // skill 0 → pure random
    if (skill === 0) return randomMove(b);

    // 1–9: blend tactical + random
    // At skill 5: ~50% chance to play the best tactical move, else random
    // At skill 9: ~90% chance
    const tacticalChance = skill / 10;

    if (Math.random() < tacticalChance) {
      // Try to win first
      const win = tacticalMove(b, 'O');
      if (win !== -1) return win;

      // Try to block player from winning
      const block = tacticalMove(b, 'X');
      if (block !== -1) return block;

      // Take center if free (good general move)
      if (!b[4]) return 4;

      // Take a corner
      const corners = [0, 2, 6, 8].filter(i => !b[i]);
      if (corners.length) return corners[Math.floor(Math.random() * corners.length)];
    }

    return randomMove(b);
  }

  // ── Player click ──────────────────────────────────────────────────
  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      const vsComputer = modeSelect.value === 'pvc';

      if (over || board[i]) return;
      if (vsComputer && current === 'O') return; // block clicks during AI turn

      placeMarker(i, current);

      const result = checkWinner(board);
      if (result) { endGame(result); return; }

      current = current === 'X' ? 'O' : 'X';

      if (vsComputer && current === 'O') {
        status.textContent = 'Computer is thinking…';
        boardEl.classList.add('thinking');
        setTimeout(() => {
          const move = aiMove();
          placeMarker(move, 'O');
          boardEl.classList.remove('thinking');
          const res2 = checkWinner(board);
          if (res2) { endGame(res2); return; }
          current = 'X';
          status.textContent = "Player X's turn";
        }, 350);
      } else {
        status.textContent = `Player ${current}'s turn`;
      }
    });
  });

  document.getElementById('restart').addEventListener('click', init);

  init();
</script>
</body>
</html>
